language = "C++"
pragma_once = true
include_guard = "RULE_ENGINE_YARA_BRIDGE_HPP"
autogen_warning = "/* Generated by cbindgen from rust/yara_bridge. Do not edit by hand. */"
namespace = "rule_engine::yara_bridge"
usize_is_size_t = true
include_version = false
style = "type"

[parse]
parse_deps = false

[export]
include = [
    "ReDiagnosticView",
    "ReNode",
    "ReNodeKind",
    "ReNodeView",
    "ReParsedRuleSet",
    "ReParseResult",
    "ReParseStatus",
    "RePattern",
    "RePatternKind",
    "RePatternView",
    "ReRule",
    "ReRuleView",
    "ReSpan",
    "ReStringView",
]

[enum]
enum_class = true
derive_helper_methods = true
